<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Needle Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7/css/flag-icons.min.css">
<link rel="stylesheet" href="/style.css?v=0.5.5">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <header>
    <div class="container header-inner">
      <a class="brand" href="/" onclick="event.preventDefault();goHome()" aria-label="Go to dashboard home" title="Home">
        <svg class="brand-icon" viewBox="0 0 32 32" width="28" height="28" aria-hidden="true" focusable="false">
          <path class="brand-ring" d="M7.6 20.4C5.7 18.9 4.5 16.6 4.5 14c0-5.1 5.4-8.9 11.5-8.9S27.5 8.9 27.5 14c0 2.6-1.2 4.9-3.1 6.4"/>
          <path class="brand-ring-inner" d="M10.1 18.5C9 17.4 8.4 15.9 8.4 14.2c0-3.5 3.4-6.1 7.6-6.1s7.6 2.6 7.6 6.1c0 1.7-.6 3.2-1.7 4.3"/>
          <path class="brand-mast" d="M16 3.6v21.8M12.3 10.6 16 3.6l3.7 7M11.1 22.3 16 25.4l4.9-3.1"/>
          <path class="brand-beam" d="M16 7.5 9.2 20.5M16 7.5l6.8 13M6.1 25.9c2.2-1 4.4-1 6.6 0s4.4 1 6.6 0 4.4-1 6.6 0"/>
          <circle class="brand-core" cx="16" cy="14.2" r="2.4"/>
          <circle class="brand-spark" cx="16" cy="14.2" r="0.82"/>
        </svg>
        <div class="brand-text">
          <h1>NEEDLE</h1>
          <p>Server Monitoring</p>
        </div>
      </a>
      <div class="header-actions">
        <button class="header-icon-btn" id="view-toggle" type="button" onclick="toggleView()" aria-label="Switch to list view" title="Switch to list view">
          <svg id="view-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button class="header-icon-btn" id="theme-cycle" type="button" onclick="cycleTheme()" aria-label="Change theme, currently light" title="Change theme, currently light">
          <svg id="theme-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M5.64 5.64l1.77 1.77M16.6 16.6l1.77 1.77M5.64 18.36l1.77-1.77M16.6 7.4l1.77-1.77"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="server-info-bar container">
    <div class="server-info" id="server-info"></div>
    <a class="github-link" href="https://github.com/Robinproxy/Needle" target="_blank" rel="noopener noreferrer" title="GitHub">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
    </a>
  </div>

  <div id="dashboard-alert" class="dashboard-alert container" role="status" aria-live="polite" hidden>
    <span id="dashboard-alert-text"></span>
    <button class="btn btn-ghost btn-sm" type="button" onclick="fullRefresh()">Retry</button>
  </div>

  <main class="container">
    <div id="card-grid" class="card-grid"></div>

    <div id="empty-state" class="empty-state" role="status" aria-live="polite">
      <div class="empty-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </div>
      <div id="empty-title" class="empty-title">Loading nodes...</div>
      <div id="empty-desc" class="empty-desc">Fetching the latest monitoring data.</div>
    </div>
  </main>

  <footer>
    <div class="container footer-inner">
      <span id="version-label">NEEDLE</span>
      <span>Server Monitoring</span>
      <span id="footer-status" class="footer-status loading" role="status" aria-live="polite">● Connecting...</span>
    </div>
  </footer>

<script src="/app.js?v=0.5.10"></script>
</body>
</html>

name: Docker

on:
  push:
    branches: [main]
    tags: [v*]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION=${{ github.ref_name }}
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "${{ github.sha }}" | cut -c1-7)
          fi
          docker build --build-arg VERSION=$VERSION -t ghcr.io/robinproxy/needle:latest .
          if [ "${{ github.ref_type }}" = "tag" ]; then
            docker tag ghcr.io/robinproxy/needle:latest ghcr.io/robinproxy/needle:${{ github.ref_name }}
          fi
          docker push --all-tags ghcr.io/robinproxy/needle
